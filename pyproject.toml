[project]
name = "mcp-server-git"
version = "0.6.3"
description = "A Model Context Protocol server providing tools to read, search, and manipulate Git repositories programmatically via LLMs"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Anthropic, PBC." }]
maintainers = [{ name = "David Soria Parra", email = "davidsp@anthropic.com" }]
keywords = ["git", "mcp", "llm", "automation"]
license = { text = "MIT" }
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
]
dependencies = [
    "click>=8.1.7",
    "gitpython>=3.1.43",
    "mcp>=1.0.0",
    "pydantic>=2.0.0",
    "aiohttp>=3.8.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-timeout>=2.1.0",
    "pytest-aiohttp>=1.0.0",
    "pytest-mock>=3.10.0",
    "pytest-benchmark>=4.0.0",
    "pytest-json-report>=1.5.0",
    "pytest-metadata>=3.0.0",
    "pytest-faker>=2.0.0",
    "pytest-hypothesis>=0.19.0",
    "ruff>=0.1.0",
    "mypy>=1.0.0",
    "safety>=3.0.0",
    "pip-audit>=2.6.0",
]

[project.scripts]
mcp-server-git = "mcp_server_git:main"
mcp-server-git-simple = "mcp_server_git.server_simple:main_cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"


[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
pythonpath = ["src"]
addopts = "-v --tb=short --timeout=30"
timeout = 30
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "e2e: marks tests as end-to-end tests (deselect with '-m \"not e2e\"')",
    "ci_skip: marks tests to skip in CI environment",
    "mcp_verification: tests that replicate manual MCP verification process",
    "phase1: basic git operations (status, log, diff)",
    "phase2: GitHub API operations (list PRs, get details, status)",
    "phase3: advanced git operations (show, security validation)",
    "phase4: error handling and edge cases",
    "requires_github_token: tests that require GitHub API access"
]

[tool.ruff]
# Pin to CI-compatible settings for ruff 0.8.0
target-version = "py310"
line-length = 88

[tool.ruff.lint]
# File-specific TDD support: Only relax linting for type test files during TDD red phase
[tool.ruff.lint.per-file-ignores]
# TDD type tests: Allow undefined names and unused imports during red phase
"tests/unit/types/*.py" = ["F821", "F401", "F841"]
# Ensure production code maintains strict standards
"src/mcp_server_git/types/*.py" = []

[tool.ruff.format]
# Ensure consistent formatting across ruff versions
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pixi.project]
channels = ["conda-forge"]
platforms = ["linux-64"]  # CI-optimized: single platform for reliability

[tool.pixi.dependencies]
python = ">=3.10"
psutil = ">=5.9.0"

[tool.pixi.pypi-dependencies]
mcp-server-git = { path = ".", editable = true }

# ===== TIERED QUALITY FEATURES =====
# TIER 1: Essential Quality Gates (ZERO-TOLERANCE)
[tool.pixi.feature.quality.dependencies]
# Core Testing Framework
pytest = ">=8.0.0"
pytest-asyncio = ">=0.21.0"
pytest-timeout = ">=2.1.0"
ruff = ">=0.7.3"

# TIER 2: Extended Quality & Security
[tool.pixi.feature.quality-extended.dependencies]
# Coverage & Reporting
pytest-cov = ">=4.0.0"
# Pre-commit hooks
pre-commit = "*"

[tool.pixi.feature.quality-extended.pypi-dependencies]
# Type Checking
pyright = ">=1.1.389"

# TIER 3: CI/CD & Build
[tool.pixi.feature.quality-ci.dependencies]
# CI Reporting
pytest-json-report = ">=1.5.0"
pytest-html = ">=4.0.0"
# Coverage Tools
coverage = ">=7.0.0"
pytest-cov = ">=4.0.0"

# ===== LEGACY DEVELOPMENT FEATURES =====
# Keep existing dev feature for specialized tools
[tool.pixi.feature.dev-specialized.dependencies]
# Development utilities
locust = "*"
memory_profiler = "*"
pytest-benchmark = "*"

[tool.pixi.environments]
# Basic runtime environment
default = {solve-group = "default"}

# Quality gate environments (tiered approach)
quality = {features = ["quality"], solve-group = "default"}
quality-extended = {features = ["quality", "quality-extended"], solve-group = "default"}
quality-full = {features = ["quality", "quality-extended", "quality-ci"], solve-group = "default"}

# Development environment (full quality + specialized tools)
dev = {features = ["quality", "quality-extended", "quality-ci", "dev-specialized"], solve-group = "default"}

# CI environment (quality + CI reporting)
ci = {features = ["quality", "quality-ci"], solve-group = "default"}

[tool.pixi.tasks]
# ===== TIER 1: CORE DEVELOPMENT TASKS (ESSENTIAL) =====
# Installation & Setup
install-editable = "pip install -e ."
dev-setup = "echo 'Development environment ready'"

# Testing (ZERO-TOLERANCE QUALITY GATES)
test = { cmd = "pytest tests/ -v --tb=short", env = { TESTING = "true" } }
test-unit = { cmd = "pytest tests/unit/ -v", env = { TESTING = "true" } }
test-integration = { cmd = "pytest tests/integration/ -v", env = { TESTING = "true" } }
test-e2e = { cmd = "pytest tests/ -k 'e2e' -v", env = { TESTING = "true" } }
test-cov = { cmd = "pytest tests/ --cov=src/mcp_server_git --cov-report=html --cov-report=term", env = { TESTING = "true" } }

# Quality Gates (CRITICAL - MUST PASS)
lint = "ruff check src/ tests/ --select=F,E9"
lint-fix = "ruff check --fix src/ tests/"
format = "ruff format src/ tests/"
format-check = "ruff format --check src/ tests/"
typecheck = "pyright src/"

# Combined Quality Check
quality = { depends-on = ["test", "lint", "typecheck"] }

# ===== TIER 2: EXTENDED QUALITY & SECURITY TASKS =====
# Pre-commit Integration
pre-commit = "pre-commit run --all-files"
install-pre-commit = "pre-commit install"

# Extended Quality Suite
quality-extended = { depends-on = ["quality", "pre-commit"] }

# ===== TIER 3: CI/CD & DEPLOYMENT TASKS =====
# CI-specific variants (optimized for GitHub Actions)
ci-test = { cmd = "pytest tests/ --cov=src/mcp_server_git --cov-report=xml --timeout=90 -m 'not ci_skip and not e2e and not slow and not stress'", env = { TESTING = "true", ENVIRONMENT = "ci" } }
ci-lint = "ruff check src/ tests/ --select=F,E9 --output-format=github"
ci-format-check = "ruff format --check src/ tests/"
ci-typecheck = "pyright src/"

# CI Quality Gate
ci-quality = { depends-on = ["ci-test", "ci-lint", "ci-typecheck"] }

# Build & Deploy
clean = "rm -rf __pycache__ .pytest_cache .coverage htmlcov .ruff_cache"

# ===== APPLICATION TASKS =====
# Server execution
serve = "python -m mcp_server_git"
serve-simple = "python -m mcp_server_git.server_simple"
mcp-server = { cmd = "python -m mcp_server_git", env = { PYTHONPATH = "src" } }
mcp-server-debug = { cmd = "python -m mcp_server_git -vv --enable-file-logging", env = { PYTHONPATH = "src", LOG_LEVEL = "DEBUG" } }

# ===== LEGACY/SPECIALIZED TASKS =====
# Keep existing specialized tasks for compatibility
benchmark = "pytest tests/benchmarks/ --benchmark-only --benchmark-sort=mean"
load-test = "locust -f tests/load_tests/locustfile.py --host=http://localhost:8000"
