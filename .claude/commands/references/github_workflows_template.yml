# GitHub Actions CI Template for Pixi Projects
# This template provides a complete CI workflow for Python projects using pixi
# with comprehensive quality checks and cross-platform validation.
#
# USAGE INSTRUCTIONS:
# 1. Create .github/workflows/ directory in your project root
# 2. Copy this file as ci.yml
# 3. Adjust branches, Python versions, and platform matrix as needed
# 4. Ensure your pyproject.toml has the standardized pixi tasks

name: CI

on:
  push:
    branches: [main, master, develop, development]
  pull_request:
    branches: [main, master, develop, development]

env:
  PYTHONNOUSERSITE: 1
  PIXI_VERSION: v0.49.0  # Latest stable version

jobs:
  # =============================================================================
  # QUALITY GATES - PRIMARY CI PIPELINE
  # =============================================================================
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]  # Adjust based on your project requirements

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.11
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          manifest-path: pyproject.toml  # CRITICAL: Explicit manifest path

      - name: Install dependencies
        run: pixi install -e ci

      - name: Install project in editable mode
        run: pixi run -e ci pip install -e .

      # Core Quality Checks (STANDARDIZED TASKS)
      - name: Run format check
        run: |
          echo "🎨 Running format check..."
          pixi run -e ci format-check || {
            echo "❌ Format check failed - showing diff:"
            pixi run -e ci format --diff
            exit 1
          }

      - name: Run linting (ZERO-TOLERANCE)
        run: |
          echo "🔍 Running critical linting..."
          pixi run -e ci lint
          if [ $? -ne 0 ]; then
            echo "::error::Critical lint violations detected - ZERO TOLERANCE POLICY"
            exit 1
          fi

      - name: Run type checking
        run: |
          echo "🏷️ Running type checking..."
          pixi run -e ci typecheck

      - name: Run comprehensive quality check
        run: |
          echo "✅ Running comprehensive quality pipeline..."
          pixi run -e ci quality

      - name: Run tests with coverage
        run: |
          echo "🧪 Running tests with coverage..."
          pixi run -e ci test-cov
          if [ $? -ne 0 ]; then
            echo "::error::Tests failed - ZERO TOLERANCE POLICY"
            exit 1
          fi

      - name: Run security scan
        run: |
          echo "🔒 Running security scan..."
          pixi run -e ci security-scan

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'  # Only upload once
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          token: ${{ secrets.CODECOV_TOKEN }}

  # =============================================================================
  # BUILD AND PACKAGE VALIDATION
  # =============================================================================
  build-test:
    name: Build and Package Test
    runs-on: ubuntu-latest
    needs: quality-gates
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.11
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          manifest-path: pyproject.toml

      - name: Install dependencies
        run: pixi install -e dev

      - name: Build package
        run: |
          echo "📦 Building package..."
          pixi run -e dev build

      - name: Test package installation
        run: |
          echo "🧪 Testing package installation..."
          pip install dist/*.whl
          python -c "import $(echo ${{ github.repository }} | cut -d'/' -f2 | tr '-' '_'); print('Package imported successfully')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/

  # =============================================================================
  # CROSS-PLATFORM VALIDATION (OPTIONAL - ENABLE FOR MULTI-PLATFORM PROJECTS)
  # =============================================================================
  cross-platform:
    name: Cross-Platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality-gates
    if: github.event_name == 'push' && contains(github.ref, 'main')  # Only on main branch
    timeout-minutes: 20
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.11
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          manifest-path: pyproject.toml

      - name: Install dependencies
        run: pixi install -e dev

      - name: Run smoke tests
        run: |
          echo "🔬 Running cross-platform smoke tests..."
          pixi run -e dev test-fast

  # =============================================================================
  # SECURITY AND DEPENDENCY AUDIT
  # =============================================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: quality-gates
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.11
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          manifest-path: pyproject.toml

      - name: Install dependencies
        run: pixi install -e quality

      - name: Run comprehensive security scan
        run: |
          echo "🛡️ Running comprehensive security audit..."
          pixi run -e quality static-analysis

      - name: Check for dependency vulnerabilities
        run: |
          echo "🔍 Checking dependency vulnerabilities..."
          pixi run -e quality safety-check

  # =============================================================================
  # PERFORMANCE BENCHMARKS (OPTIONAL)
  # =============================================================================
  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: quality-gates
    if: github.event_name == 'push'  # Only on push, not PR
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.11
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          manifest-path: pyproject.toml

      - name: Install dependencies
        run: pixi install -e dev

      - name: Run performance tests
        run: |
          echo "⚡ Running performance benchmarks..."
          pixi run -e dev test-performance || echo "⚠️ Performance tests not available"

  # =============================================================================
  # DEPLOYMENT READINESS CHECK
  # =============================================================================
  deployment-ready:
    name: Deployment Ready
    runs-on: ubuntu-latest
    needs: [quality-gates, build-test, security-audit]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.11
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          manifest-path: pyproject.toml

      - name: Validate deployment readiness
        run: |
          echo "🚀 Validating deployment readiness..."
          pixi run -e ci check-all
          echo "✅ All quality gates passed - ready for deployment"

      - name: Generate deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All quality gates passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Security audit completed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build and package tests passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: Ready for deployment 🎉" >> $GITHUB_STEP_SUMMARY

# =============================================================================
# WORKFLOW NOTES
# =============================================================================

# This workflow includes:
# 1. QUALITY GATES: Comprehensive quality validation using standardized pixi tasks
# 2. BUILD TEST: Package build and installation validation
# 3. CROSS-PLATFORM: Multi-OS compatibility testing (optional)
# 4. SECURITY AUDIT: Security and dependency vulnerability scanning
# 5. PERFORMANCE: Performance benchmark testing (optional)
# 6. DEPLOYMENT READY: Final validation for deployment readiness

# Critical requirements:
# - pyproject.toml must have standardized pixi tasks (test, lint, quality, etc.)
# - All jobs use explicit manifest-path: pyproject.toml
# - Zero-tolerance policy for critical quality checks
# - Proper timeout settings to prevent hanging jobs
# - Strategic caching for performance optimization

# Customization points:
# - Adjust Python versions in matrix
# - Enable/disable optional jobs based on project needs
# - Configure platform matrix for cross-platform projects
# - Add project-specific environment variables
# - Customize timeout values based on project complexity