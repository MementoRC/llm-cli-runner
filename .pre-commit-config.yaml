---
# Pre-commit hooks configuration for MCP Server Cheap LLM
# Follows enterprise security standards and comprehensive quality validation

repos:
  # Security and vulnerability scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: ["-c", ".bandit", "-r", "src/"]
        pass_filenames: false

  # Safety check for known vulnerabilities
  - repo: local
    hooks:
      - id: safety-check
        name: safety-check
        entry: pixi run -e quality-extended safety check --ignore=70929 --ignore=70912
        language: system
        pass_filenames: false

  # Code formatting and style with Ruff (faster, better than Black)
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.7.3
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # Import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  # Type checking with pyright (pixi-based)
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: pixi run -e quality pyright src/
        language: system
        pass_filenames: false

  # YAML validation
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-d", "relaxed"]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-json
      - id: detect-private-key
      - id: forbid-new-submodules

  # Documentation checks
  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        args: ["--convention=google", "--add-ignore=D202"]

  # Local hooks - pytest with targeted ignores for known issues
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pixi run -e quality pytest tests/unit/ -x --tb=short
        language: system
        pass_filenames: false
