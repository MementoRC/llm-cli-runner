name: Simple Tests

on:
  push:
    branches: [main, master, develop, development]
  pull_request:
    branches: [main, master, develop, development]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install package and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-asyncio pytest-cov pytest-timeout ruff
    
    - name: Run critical lint checks (ZERO-TOLERANCE)
      run: |
        echo "🚨 Running critical lint checks (F,E9)..."
        ruff check src/ tests/ --select=F,E9
        if [ $? -ne 0 ]; then
          echo "::error::❌ CRITICAL: F,E9 violations detected - ZERO TOLERANCE"
          exit 1
        fi
        echo "✅ No critical violations found"
    
    - name: Run TDD tests
      run: |
        echo "🧪 Running TDD test suite..."
        pytest tests/unit/test_basic.py tests/unit/test_config_minimal.py tests/unit/test_server_handlers.py -v
    
    - name: Run test coverage
      run: |
        echo "📊 Running test coverage..."
        pytest tests/unit/ --cov=src/mcp_server_cheap_llm --cov-report=term --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.python-version }}