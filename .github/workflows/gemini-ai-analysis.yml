name: Gemini AI Analysis

# AI-powered code analysis, review, and insights using Google's Gemini CLI
# Integrates with CI Framework for enhanced automated analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master, development]

  # Trigger on CI failures for intelligent failure analysis
  workflow_run:
    workflows: ["CI Framework"]
    types: [completed]

  # Manual trigger for ad-hoc analysis
  workflow_dispatch:
    inputs:
      analysis_type:
        description: 'Type of analysis to perform'
        required: false
        default: 'comprehensive'
        type: choice
        options:
          - 'code-review'
          - 'security-analysis'
          - 'performance-analysis'
          - 'comprehensive'

      focus_area:
        description: 'Specific area to focus analysis on'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'src/cache'
          - 'src/providers'
          - 'src/core'
          - 'tests'

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  PYTHONNOUSERSITE: 1
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  # AI-powered pull request review
  ai-code-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
    - name: Check API key availability
      id: check-key
      run: |
        if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
          echo "available=true" >> $GITHUB_OUTPUT
        else
          echo "available=false" >> $GITHUB_OUTPUT
          echo "::notice::GEMINI_API_KEY secret not configured - AI analysis will be skipped"
        fi

    - name: Checkout code
      if: steps.check-key.outputs.available == 'true'
      uses: actions/checkout@v4
      with:
        # Get full history for better context
        fetch-depth: 0

    - name: Get PR changes
      if: steps.check-key.outputs.available == 'true'
      id: changes
      run: |
        # Get list of changed files
        git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} > changed_files.txt
        echo "changed_files<<EOF" >> $GITHUB_OUTPUT
        cat changed_files.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        # Get diff content for AI analysis
        git diff ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} > pr_diff.txt

    - name: AI Code Review
      if: steps.check-key.outputs.available == 'true'
      id: ai-code-review
      uses: google-github-actions/run-gemini-cli@v0
      with:
        prompt: |
          You are an expert Python developer reviewing code for a Model Context Protocol (MCP) server that provides multi-provider LLM access.

          **Project Context:**
          - This is an MCP server for multi-provider LLM access (Gemini, OpenAI, LLaMA)
          - Built with Python 3.12+, aiohttp, pydantic, structlog
          - Uses pixi for dependency management
          - Implements caching, circuit breakers, and batch processing
          - Zero-tolerance quality policy (F,E9 violations fail CI)

          **Changed Files:**
          ${{ steps.changes.outputs.changed_files }}

          **Code Changes to Review:**
          ```diff
          $(head -n 200 pr_diff.txt)
          ```

          **Please provide a comprehensive code review focusing on:**
          1. **Code Quality**: Python best practices, type hints, error handling
          2. **MCP Protocol**: Correct implementation of MCP server patterns
          3. **Performance**: Async/await usage, caching efficiency, resource management
          4. **Security**: Input validation, API key handling, injection vulnerabilities
          5. **Testing**: Test coverage gaps, test quality improvements
          6. **Architecture**: Design patterns, separation of concerns, maintainability

          **Format your response as:**
          ## 🔍 AI Code Review Summary

          ### ✅ Strengths
          - [List positive aspects]

          ### ⚠️ Concerns & Suggestions
          - [List issues with file:line references and suggestions]

          ### 🚀 Optimization Opportunities
          - [Performance and architecture improvements]

          ### 🧪 Testing Recommendations
          - [Test coverage and quality suggestions]

          ### 📝 Documentation
          - [Documentation improvements needed]

          **Overall Assessment:** [Rating: Excellent/Good/Needs Work] - [Brief summary]

        gemini_api_key: ${{ secrets.GEMINI_API_KEY }}

    - name: Post Review Comment
      if: steps.check-key.outputs.available == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const output = `${{ steps.ai-code-review.outputs.summary }}`;

          // Post AI review as PR comment
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🤖 Gemini AI Code Review

            ${output}

            ---
            *This review was generated by Gemini AI and should be considered alongside human code review.*`
          });

  # AI-powered CI failure analysis
  ci-failure-analysis:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest

    steps:
    - name: Check API key availability
      id: check-key
      run: |
        if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
          echo "available=true" >> $GITHUB_OUTPUT
        else
          echo "available=false" >> $GITHUB_OUTPUT
          echo "::notice::GEMINI_API_KEY secret not configured - AI failure analysis will be skipped"
        fi

    - name: Checkout code
      if: steps.check-key.outputs.available == 'true'
      uses: actions/checkout@v4

    - name: Get CI failure details
      if: steps.check-key.outputs.available == 'true'
      id: failure
      run: |
        # Get recent workflow runs and failure details
        echo "Analyzing CI failure for workflow run: ${{ github.event.workflow_run.id }}"

        # Create failure context (would normally fetch from GitHub API)
        echo "failure_context=CI Framework workflow failed with multiple job failures" >> $GITHUB_OUTPUT

    - name: AI Failure Analysis
      if: steps.check-key.outputs.available == 'true'
      id: ai-failure-analysis
      uses: google-github-actions/run-gemini-cli@v0
      with:
        prompt: |
          You are an expert DevOps engineer analyzing CI/CD pipeline failures for a Python MCP server project.

          **Project Context:**
          - Python 3.12+ MCP server with pixi dependency management
          - CI Framework with quality gates, security scanning, performance monitoring
          - Zero-tolerance policy for F,E9 lint violations

          **Failure Context:**
          ${{ steps.failure.outputs.failure_context }}

          **Common Failure Patterns to Check:**
          1. **Dependency Issues**: pixi environment resolution, conda-forge package availability
          2. **Quality Gate Failures**: F,E9 violations, test failures, type checking errors
          3. **Security Scan Issues**: bandit findings, safety vulnerabilities
          4. **Performance Regressions**: benchmark threshold violations
          5. **Cross-Platform Issues**: Platform-specific dependency conflicts

          **Please analyze and provide:**
          ## 🔧 CI Failure Analysis

          ### 🎯 Root Cause Analysis
          - [Identify likely root causes]

          ### 🛠️ Immediate Fixes
          - [Specific commands/changes to resolve]

          ### 🚀 Prevention Strategies
          - [How to prevent similar failures]

          ### 📋 Investigation Steps
          1. [Step-by-step debugging approach]

          **Priority Level:** [High/Medium/Low] - [Justification]

        gemini_api_key: ${{ secrets.GEMINI_API_KEY }}

    - name: Create Issue for CI Failure
      if: steps.check-key.outputs.available == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const analysis = `${{ steps.ai-failure-analysis.outputs.summary }}`;

          // Create GitHub issue for CI failure analysis
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `🔥 CI Failure Analysis - Workflow Run #${{ github.event.workflow_run.id }}`,
            body: `## 🤖 AI-Powered Failure Analysis

            **Workflow:** ${{ github.event.workflow_run.name }}
            **Run ID:** ${{ github.event.workflow_run.id }}
            **Conclusion:** ${{ github.event.workflow_run.conclusion }}

            ${analysis}

            ## 🔗 Links
            - [Failed Workflow Run](${{ github.event.workflow_run.html_url }})
            - [Repository](${{ github.event.repository.html_url }})

            ---
            *This analysis was generated by Gemini AI. Please verify suggestions before implementation.*`,
            labels: ['ci-failure', 'ai-analysis', 'high-priority']
          });

  # Manual comprehensive analysis
  comprehensive-analysis:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
    - name: Check API key availability
      id: check-key
      run: |
        if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
          echo "available=true" >> $GITHUB_OUTPUT
        else
          echo "available=false" >> $GITHUB_OUTPUT
          echo "::error::GEMINI_API_KEY secret not configured - cannot run manual analysis"
          exit 1
        fi

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Prepare analysis context
      id: context
      run: |
        # Gather project context based on focus area
        FOCUS="${{ github.event.inputs.focus_area }}"

        if [ "$FOCUS" = "all" ] || [ "$FOCUS" = "" ]; then
          find src/ -name "*.py" | head -10 > analysis_files.txt
        else
          find $FOCUS -name "*.py" 2>/dev/null | head -10 > analysis_files.txt || echo "No files found in $FOCUS"
        fi

        echo "analysis_files<<EOF" >> $GITHUB_OUTPUT
        cat analysis_files.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Comprehensive AI Analysis
      id: comprehensive-analysis
      uses: google-github-actions/run-gemini-cli@v0
      with:
        prompt: |
          You are an expert software architect conducting a comprehensive analysis of a Python MCP server project.

          **Analysis Type:** ${{ github.event.inputs.analysis_type }}
          **Focus Area:** ${{ github.event.inputs.focus_area }}

          **Project Architecture:**
          - MCP server for multi-provider LLM access (Gemini, OpenAI, LLaMA)
          - Modular design: cache/, providers/, core/, services/
          - Async Python with aiohttp, pydantic validation, structlog
          - Advanced features: caching, circuit breakers, batch processing

          **Files to Analyze:**
          ${{ steps.context.outputs.analysis_files }}

          Please provide analysis based on the selected type:

          **For code-review:**
          - Architecture patterns and design decisions
          - Code quality and maintainability
          - Python best practices compliance

          **For security-analysis:**
          - Security vulnerabilities and risks
          - Input validation coverage
          - API key and credential handling

          **For performance-analysis:**
          - Performance bottlenecks and optimizations
          - Async/await pattern usage
          - Caching strategy effectiveness

          **For comprehensive:**
          - All of the above plus strategic recommendations

          ## 📊 Comprehensive Analysis Report

          ### 🏗️ Architecture Assessment
          [Analysis results]

          ### 🔍 Code Quality Review
          [Quality findings]

          ### 🚀 Optimization Recommendations
          [Performance suggestions]

          ### 🔒 Security Assessment
          [Security findings]

          ### 📋 Action Items
          1. [Prioritized improvements]

          **Overall Project Health:** [Excellent/Good/Needs Attention] - [Summary]

        gemini_api_key: ${{ secrets.GEMINI_API_KEY }}

    - name: Save Analysis Report
      run: |
        # Save analysis to job summary
        echo "## 🤖 Gemini AI Comprehensive Analysis" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Analysis Type:** ${{ github.event.inputs.analysis_type }}" >> $GITHUB_STEP_SUMMARY
        echo "**Focus Area:** ${{ github.event.inputs.focus_area }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "${{ steps.comprehensive-analysis.outputs.summary }}" >> $GITHUB_STEP_SUMMARY
