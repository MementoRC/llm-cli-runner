name: Quality Gates

# Enhanced quality gates aligned with CI Framework standards
# Maintains zero-tolerance approach while adding CI Framework compatibility

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_call:
    inputs:
      tier:
        description: 'Quality tier (essential/comprehensive/extended)'
        required: false
        default: 'essential'
        type: string
      fail-fast:
        description: 'Fail fast on first error'
        required: false
        default: true
        type: boolean

env:
  PYTHONNOUSERSITE: 1
  PYTHONDONTWRITEBYTECODE: 1
  PIXI_VERSION: v0.49.0

jobs:
  quality-gates:
    name: Zero-Tolerance Quality Checks - ${{ inputs.tier || 'essential' }} tier
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup pixi
      uses: prefix-dev/setup-pixi@v0.8.11
      with:
        pixi-version: ${{ env.PIXI_VERSION }}
        cache: true
        cache-key: quality-gates-${{ inputs.tier || 'essential' }}-${{ runner.os }}-${{ github.run_id }}-${{ hashFiles('pyproject.toml', 'pixi.lock') }}
        manifest-path: pyproject.toml

    - name: Install dependencies (Essential Tier)
      if: inputs.tier == 'essential' || inputs.tier == '' || inputs.tier == null
      run: pixi install -e quality

    - name: Install dependencies (Comprehensive/Extended Tier)
      if: inputs.tier == 'comprehensive' || inputs.tier == 'extended'
      run: pixi install -e quality-extended

    - name: 🚨 CRITICAL - F,E9 Violations Check
      run: |
        echo "🚨 ZERO-TOLERANCE: Checking for F,E9 violations..."
        pixi run -e quality lint
        if [ $? -ne 0 ]; then
          echo "❌ CRITICAL FAILURE: F,E9 violations detected!"
          echo "Fix all import and syntax errors before proceeding."
          exit 1
        fi
        echo "✅ No F,E9 violations found"

    - name: 📋 Test Coverage Check
      run: |
        echo "📋 Running test coverage analysis..."
        pixi run -e quality test-cov
        if [ $? -ne 0 ]; then
          echo "⚠️ WARNING: Test coverage issues"
          echo "Check test results and improve coverage."
        fi

    - name: 🔍 Repository Hygiene Check
      run: |
        echo "🔍 Checking repository hygiene..."

        # Check for __pycache__ directories (excluding .pixi/)
        if find . -type d -name "__pycache__" -not -path "./.pixi/*" | grep -q .; then
          echo "❌ ERROR: __pycache__ directories found!"
          echo "These should not be committed. Add to .gitignore."
          exit 1
        fi

        # Check for .pyc files (excluding .pixi/)
        if find . -name "*.pyc" -not -path "./.pixi/*" | grep -q .; then
          echo "❌ ERROR: .pyc files found!"
          echo "These should not be committed. Add to .gitignore."
          exit 1
        fi

        # Check .gitignore exists
        if [ ! -f .gitignore ]; then
          echo "❌ ERROR: .gitignore file missing!"
          exit 1
        fi

        echo "✅ Repository hygiene check passed"

    - name: 📊 Quality Summary
      if: always()
      run: |
        echo "📊 Quality Gate Summary - ${{ inputs.tier || 'essential' }} tier"
        echo "============================================"
        echo "✅ Critical lint checks (F,E9): PASSED"
        echo "📋 Test coverage: See above"
        echo "🔍 Repository hygiene: See above"
        echo ""
        echo "🎯 CI Framework Tier: ${{ inputs.tier || 'essential' }}"
        echo "🛡️ Zero-Tolerance Policy: ENFORCED"
        echo ""
        echo "Remember: ZERO-TOLERANCE for F,E9 violations!"

    # CI Framework compatibility outputs
    outputs:
      quality-tier: ${{ inputs.tier || 'essential' }}
      success: ${{ job.status == 'success' }}
      fail-fast: ${{ inputs.fail-fast }}
