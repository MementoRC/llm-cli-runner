name: CI

on:
  push:
    branches: [main, master, develop, development]
  pull_request:
    branches: [main, master, develop, development]

env:
  PYTHONNOUSERSITE: 1
  PIXI_VERSION: v0.49.0  # Latest stable version

jobs:
  quality-gates:
    name: Quality Gates (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.11
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          manifest-path: pyproject.toml

      - name: Install dependencies
        run: |
          echo "📦 Installing pixi dependencies..."
          pixi install -e dev
          echo "✅ Dependencies installed successfully"

      - name: Install project in editable mode
        run: |
          echo "📦 Installing project in editable mode..."
          pixi run -e dev install-editable

      - name: Run format check
        run: |
          echo "🎨 Running format check..."
          pixi run -e dev format-check || {
            echo "❌ Format check failed - showing diff:"
            pixi run -e dev format-diff
            exit 1
          }

      - name: Run linting (ZERO-TOLERANCE)
        run: |
          echo "🔍 Running critical linting..."
          pixi run -e dev lint
          if [ $? -ne 0 ]; then
            echo "::error::Critical lint violations detected - ZERO TOLERANCE POLICY"
            exit 1
          fi

      - name: Run type checking
        run: |
          echo "🏷️ Running type checking..."
          pixi run -e dev typecheck

      - name: Run unit tests with coverage
        run: |
          echo "🧪 Running tests with coverage..."
          pixi run -e dev test-cov
          if [ $? -ne 0 ]; then
            echo "::error::Unit tests failed - ZERO TOLERANCE POLICY"
            exit 1
          fi

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  build-test:
    name: Build and Package Test
    runs-on: ubuntu-latest
    needs: quality-gates

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.11
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          manifest-path: pyproject.toml

      - name: Install dependencies
        run: pixi install -e dev

      - name: Install project in editable mode
        run: |
          echo "📦 Installing project in editable mode..."
          pixi run -e dev install-editable

      - name: Build package
        run: |
          echo "📦 Building package..."
          pixi run -e dev build

      - name: Test package installation
        run: |
          echo "🧪 Testing package installation..."
          pixi run -e dev pip install dist/*.whl
          pixi run -e dev python -c "import mcp_server_cheap_llm; print('✅ Package imported successfully')"
