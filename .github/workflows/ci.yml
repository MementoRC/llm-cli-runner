name: CI

on:
  push:
    branches: [ main, master, development ]
  pull_request:
    branches: [ main, master, development ]

env:
  PYTHONNOUSERSITE: 1
  PIXI_VERSION: v0.49.0

jobs:
  # Fast quality check on linux-64 with Python 3.12+ only
  quality-gates:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup pixi
      uses: prefix-dev/setup-pixi@v0.8.11
      with:
        pixi-version: ${{ env.PIXI_VERSION }}
        cache: true
        manifest-path: pyproject.toml

    - name: Install dependencies
      run: pixi install -e quality

    - name: Run quality pipeline
      run: pixi run -e quality quality

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  # Cross-platform validation with Python 3.12+ only (using --platform flag)
  cross-platform-test:
    runs-on: ${{ matrix.os }}
    needs: [quality-gates]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
        - os: ubuntu-latest
          platform: linux-64
        - os: windows-latest
          platform: win-64
        - os: macos-latest
          platform: osx-64
    steps:
    - uses: actions/checkout@v4

    - name: Setup pixi
      uses: prefix-dev/setup-pixi@v0.8.11
      with:
        pixi-version: ${{ env.PIXI_VERSION }}
        cache: true
        manifest-path: pyproject.toml

    - name: Install dependencies for cross-platform
      run: pixi install -e ci-minimal --platform ${{ matrix.platform }}

    - name: Run cross-platform tests
      run: pixi run -e ci-minimal --platform ${{ matrix.platform }} test

  security:
    runs-on: ubuntu-latest
    needs: [quality-gates]
    steps:
    - uses: actions/checkout@v4

    - name: Setup pixi
      uses: prefix-dev/setup-pixi@v0.8.11
      with:
        pixi-version: ${{ env.PIXI_VERSION }}
        cache: true
        manifest-path: pyproject.toml

    - name: Install dependencies
      run: pixi install -e quality-extended

    - name: Run security checks
      run: pixi run -e quality-extended static-analysis

  build:
    runs-on: ubuntu-latest
    needs: [quality-gates]
    steps:
    - uses: actions/checkout@v4

    - name: Setup pixi
      uses: prefix-dev/setup-pixi@v0.8.11
      with:
        pixi-version: ${{ env.PIXI_VERSION }}
        cache: true
        manifest-path: pyproject.toml

    - name: Install dependencies
      run: pixi install -e quality-full

    - name: Build and check package
      run: pixi run -e quality-full build
