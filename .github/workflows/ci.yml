name: CI with Pixi Failover

on:
  push:
    branches: [main, master, develop, development]
  pull_request:
    branches: [main, master, develop, development]

env:
  PYTHONNOUSERSITE: 1
  PIXI_VERSION: v0.50.0  # Latest stable version
  SETUP_PIXI_VERSION: v0.8.11  # Latest setup-pixi action version

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pixi (primary method)
        id: setup-pixi
        continue-on-error: true
        uses: prefix-dev/setup-pixi@${{ env.SETUP_PIXI_VERSION }}
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          manifest-path: pyproject.toml

      - name: Manual pixi installation (failover)
        if: steps.setup-pixi.outcome == 'failure'
        run: |
          echo "⚠️ setup-pixi action failed, falling back to manual installation"
          echo "📥 Downloading pixi ${{ env.PIXI_VERSION }}..."

          # Download and install pixi manually with retry logic
          for i in {1..3}; do
            echo "🔄 Download attempt $i/3"
            if curl -fsSL https://pixi.sh/install.sh | bash -s -- --version ${{ env.PIXI_VERSION }}; then
              echo "✅ Manual pixi installation successful"
              break
            else
              echo "❌ Download attempt $i failed"
              if [ $i -eq 3 ]; then
                echo "💥 All download attempts failed"
                exit 1
              fi
              echo "⏳ Waiting 10 seconds before retry..."
              sleep 10
            fi
          done

          # Add to PATH
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

          # Verify installation
          echo "🔍 Verifying pixi installation..."
          export PATH="$HOME/.pixi/bin:$PATH"
          pixi --version
          echo "✅ Pixi failover installation complete"

      - name: Verify pixi installation
        run: |
          echo "🔍 Final pixi verification..."
          pixi --version
          echo "📂 Working directory: $(pwd)"
          echo "📋 Checking pyproject.toml..."
          ls -la pyproject.toml
          echo "🔍 Pixi info (if available)..."
          pixi info || echo "⚠️ Pixi info command not available or no manifest found"

      - name: Install dependencies
        run: |
          echo "📦 Installing pixi dependencies..."
          pixi install -e dev
          echo "✅ Dependencies installed successfully"

      - name: Install project in editable mode
        run: |
          echo "📦 Installing project in editable mode..."
          pixi run -e dev install-editable

      - name: Run format check
        run: |
          echo "🎨 Running format check..."
          pixi run -e dev format-check || {
            echo "❌ Format check failed - showing diff:"
            pixi run -e dev ruff format --diff src/ tests/
            exit 1
          }

      - name: Run linting (ZERO-TOLERANCE)
        run: |
          echo "🔍 Running critical linting..."
          pixi run -e dev lint
          if [ $? -ne 0 ]; then
            echo "::error::Critical lint violations detected - ZERO TOLERANCE POLICY"
            exit 1
          fi

      - name: Run type checking
        run: |
          echo "🏷️ Running type checking..."
          pixi run -e dev typecheck

      - name: Run unit tests with coverage
        run: |
          echo "🧪 Running tests with coverage..."
          pixi run -e dev test-cov
          if [ $? -ne 0 ]; then
            echo "::error::Unit tests failed - ZERO TOLERANCE POLICY"
            exit 1
          fi

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  build-test:
    name: Build and Package Test
    runs-on: ubuntu-latest
    needs: quality-gates

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pixi (primary method)
        id: setup-pixi
        continue-on-error: true
        uses: prefix-dev/setup-pixi@${{ env.SETUP_PIXI_VERSION }}
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          manifest-path: pyproject.toml

      - name: Manual pixi installation (failover)
        if: steps.setup-pixi.outcome == 'failure'
        run: |
          echo "⚠️ setup-pixi action failed, falling back to manual installation"
          echo "📥 Downloading pixi ${{ env.PIXI_VERSION }}..."

          # Download and install pixi manually with retry logic
          for i in {1..3}; do
            echo "🔄 Download attempt $i/3"
            if curl -fsSL https://pixi.sh/install.sh | bash -s -- --version ${{ env.PIXI_VERSION }}; then
              echo "✅ Manual pixi installation successful"
              break
            else
              echo "❌ Download attempt $i failed"
              if [ $i -eq 3 ]; then
                echo "💥 All download attempts failed"
                exit 1
              fi
              echo "⏳ Waiting 10 seconds before retry..."
              sleep 10
            fi
          done

          # Add to PATH
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

          # Verify installation
          echo "🔍 Verifying pixi installation..."
          export PATH="$HOME/.pixi/bin:$PATH"
          pixi --version
          echo "✅ Pixi failover installation complete"

      - name: Verify pixi installation
        run: |
          echo "🔍 Final pixi verification..."
          pixi --version

      - name: Install dependencies
        run: pixi install -e dev

      - name: Install project in editable mode
        run: |
          echo "📦 Installing project in editable mode..."
          pixi run -e dev install-editable

      - name: Build package
        run: |
          echo "📦 Building package..."
          pixi run -e dev build

      - name: Test package installation
        run: |
          echo "🧪 Testing package installation..."
          pip install dist/*.whl
          python -c "import mcp_server_cheap_llm; print('✅ Package imported successfully')"
