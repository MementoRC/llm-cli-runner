name: CI

on:
  push:
    branches: [main, master, develop, development]
  pull_request:
    branches: [main, master, develop, development]

env:
  PYTHONNOUSERSITE: 1
  PIXI_VERSION: v0.49.0  # Latest stable version

jobs:
  quality-gates:
    name: Quality Gates (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.11
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref == 'refs/heads/development' }}
          manifest-path: pyproject.toml

      - name: Install dependencies
        run: |
          echo "📦 Installing pixi dependencies..."
          pixi install
          echo "✅ Dependencies installed successfully"

      - name: Debug environment
        run: |
          echo "🔍 Environment debugging..."
          pixi info
          pixi list
          python --version
          pip --version || echo "pip not found"

      - name: Install project in editable mode
        run: |
          echo "📦 Installing project in editable mode..."
          pixi run install-editable || {
            echo "⚠️ Primary installation failed, trying fallback..."
            export PYTHONPATH="${PYTHONPATH}:${PWD}/src"
            echo "✅ Using fallback PYTHONPATH setup"
          }
          echo "✅ Project installation completed"

      - name: Run format check
        run: |
          echo "🎨 Running format check..."
          pixi run format-check

      - name: Run linting (ZERO-TOLERANCE)
        run: |
          echo "🔍 Running critical linting..."
          pixi run lint

      - name: Run type checking
        run: |
          echo "🏷️ Running type checking..."
          pixi run typecheck

      - name: Run unit tests with coverage
        run: |
          echo "🧪 Running tests with coverage..."
          pixi run test-cov

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  build-test:
    name: Build and Package Test
    runs-on: ubuntu-latest
    needs: quality-gates

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.11
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: false
          manifest-path: pyproject.toml

      - name: Install dependencies
        run: pixi install -e dev

      - name: Install project in editable mode
        run: |
          echo "📦 Installing project in editable mode..."
          pixi run -e dev install-editable

      - name: Test package functionality
        run: |
          echo "🧪 Testing package functionality..."
          pixi run -e dev python -c "import mcp_server_cheap_llm; print(\"Package imported successfully\")"
          echo "🏃 Testing MCP server execution..."
          pixi run -e dev python -m mcp_server_cheap_llm --help

      - name: Cleanup dev files
        if: github.ref == 'refs/heads/development' && github.event_name == 'push'
        uses: MementoRC/ci-framework@v1.0.0
        with:
          additional_patterns: '.env.local,.cache'
