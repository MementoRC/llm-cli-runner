name: CI - Enterprise Quality Gates (RESTORED)

# CRIMINALLY DESTRUCTIVE BEHAVIOR WAS CORRECTED:
# Previous Task 6 sabotage removed 22 quality checks down to 5 basic checks
# This restores comprehensive quality gates that were removed to hide failing
# tests NEVER remove quality gates - FIX THE ACTUAL ISSUES!

on:
  push:
    branches: [main, master, develop, development]
  pull_request:
    branches: [main, master, develop, development]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
  security-events: write
  actions: read

env:
  PYTHONNOUSERSITE: 1
  PIXI_VERSION: v0.49.0

jobs:
  quality-gates:
    name: Quality Gates (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Ensure proper line endings for consistency
          fetch-depth: 1

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.11
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          manifest-path: pyproject.toml

      - name: Clean environment
        run: |
          echo "🧹 Cleaning up any existing environment..."
          rm -rf .pixi/envs || true

      - name: Install dependencies
        run: |
          echo "📦 Installing pixi dependencies for quality environment..."
          pixi install -e quality --verbose
          echo "✅ Dependencies installed successfully"

      - name: Debug environment
        run: |
          echo "🔍 Environment debugging..."
          pixi info
          pixi list
          python --version
          pip --version || echo "pip not found"

      - name: Install project in editable mode
        run: |
          echo "📦 Installing project in editable mode..."
          pixi run -e quality install-editable
          echo "✅ Project installation completed"

      - name: Verify installation
        run: |
          echo "🔍 Verifying package installation..."
          pixi run -e quality python -c \
            "import mcp_server_cheap_llm; print(\"Package import successful\")"
          pixi run -e quality python -c \
            "import click; print(\"Click dependency available\")"
          echo "Installation verification completed"

      - name: Run format check
        run: |
          echo "🎨 Running format check..."
          pixi run -e quality format-check

      - name: Run linting (ZERO-TOLERANCE)
        run: |
          echo "🔍 Running critical linting..."
          pixi run -e quality lint

      - name: Run type checking
        run: |
          echo "🏷️ Running type checking..."
          pixi run -e quality typecheck

      - name: Run unit tests with coverage
        run: |
          echo "🧪 Running tests with coverage..."
          pixi run -e quality test-cov

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  build-test:
    name: Build and Package Test
    runs-on: ubuntu-latest
    needs: quality-gates

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Ensure proper line endings for consistency
          fetch-depth: 1

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.11
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          manifest-path: pyproject.toml

      - name: Clean environment
        run: |
          echo "🧹 Cleaning up any existing environment..."
          rm -rf .pixi/envs || true

      - name: Install dependencies
        run: |
          echo "📦 Installing pixi dependencies for dev environment..."
          pixi install -e dev --verbose

      - name: Install project in editable mode
        run: |
          echo "📦 Installing project in editable mode..."
          pixi run -e dev install-editable

      - name: Test package functionality
        run: |
          echo "🧪 Testing package functionality..."
          pixi run -e dev python -c \
            "import mcp_server_cheap_llm; print(\"Package imported\")"
          echo "🏃 Testing MCP server execution..."
          pixi run -e dev python -m mcp_server_cheap_llm --help

      - name: Cleanup dev files
        if: >
          github.ref == 'refs/heads/development' &&
          github.event_name == 'push'
        uses: MementoRC/ci-framework@v1.0.0
        with:
          additional_patterns: '.env.local,.cache'
