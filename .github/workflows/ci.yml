name: CI

on:
  push:
    branches: [main, master, develop, development]
  pull_request:
    branches: [main, master, develop, development]

env:
  PYTHONNOUSERSITE: 1

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.20.1
          manifest-path: pyproject.toml
          run-install: true # Changed from install-dependencies
          locked: true # Added for reproducible builds
          cache: false # Temporarily disable cache
          environment: dev # Specify the environment to install

      - name: Install project in editable mode
        run: |
          # pixi install -e dev # This line is now handled by setup-pixi action
          pixi run -e dev pip install -e .

      - name: Run format check
        run: pixi run -e dev format-check

      - name: Run linting (ZERO-TOLERANCE)
        run: |
          pixi run -e dev lint
          if [ $? -ne 0 ]; then
            echo "::error::Critical lint violations detected - ZERO TOLERANCE POLICY"
            exit 1
          fi

      - name: Run type checking
        run: pixi run -e dev typecheck

      - name: Run unit tests with coverage
        run: |
          pixi run -e dev test-cov
          if [ $? -ne 0 ]; then
            echo "::error::Unit tests failed - ZERO TOLERANCE POLICY"
            exit 1
          fi

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  build-test:
    name: Build and Package Test
    runs-on: ubuntu-latest
    needs: quality-gates

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.20.1
          manifest-path: pyproject.toml
          run-install: true # Changed from install-dependencies
          locked: true # Added for reproducible builds
          cache: false # Temporarily disable cache
          environment: dev # Specify the environment to install

      - name: Install project in editable mode
        run: |
          # pixi install -e dev # This line is now handled by setup-pixi action
          pixi run -e dev pip install -e .

      - name: Build package
        run: |
          pixi run -e dev pip install build
          pixi run -e dev python -m build

      - name: Test package installation
        run: |
          pip install dist/*.whl
          python -c "import mcp_server_cheap_llm; print(mcp_server_cheap_llm.__version__)"
