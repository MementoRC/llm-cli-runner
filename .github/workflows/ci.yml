name: CI - Enterprise Quality Gates (RESTORED)

# CRIMINALLY DESTRUCTIVE BEHAVIOR WAS CORRECTED:
# Previous Task 6 sabotage removed 22 quality checks down to 5 basic checks
# This restores comprehensive quality gates that were removed to hide failing
# tests NEVER remove quality gates - FIX THE ACTUAL ISSUES!

on:
  push:
    branches: [ main, master, development ]
  pull_request:
    branches: [main, master, develop, development]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
  security-events: write
  actions: read

env:
  PYTHONNOUSERSITE: 1
  PIXI_VERSION: v0.49.0

env:
  PYTHONNOUSERSITE: 1
  PIXI_VERSION: v0.49.0

jobs:
  # Fast quality check on linux-64 with Python 3.12+ only
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Ensure proper line endings for consistency
          fetch-depth: 1

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.11
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          manifest-path: pyproject.toml

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: pixi install -e quality

    - name: Run quality checks - Lint (Critical)
      run: |
        # ZERO-TOLERANCE: F,E9 violations fail the build
        ruff check src/ tests/ --select=F,E9

    - name: Run quality checks - Format
      run: |
        ruff format --check src/ tests/

      - name: Verify installation
        run: |
          echo "🔍 Verifying package installation..."
          pixi run -e quality python -c 'import mcp_server_cheap_llm; print("Package import successful")'
          pixi run -e quality python -c 'import click; print("Click dependency available")'
          echo "Installation verification completed"

    - name: Run test coverage
      run: |
        pytest tests/unit/ --cov=src/mcp_server_cheap_llm --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  # Cross-platform validation with Python 3.12+ only (using --platform flag)
  cross-platform-test:
    runs-on: ${{ matrix.os }}
    needs: [quality-gates]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
        - os: ubuntu-latest
          platform: linux-64
        - os: windows-latest
          platform: win-64
        - os: macos-latest
          platform: osx-64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Ensure proper line endings for consistency
          fetch-depth: 1

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.11
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          manifest-path: pyproject.toml

    - name: Install dependencies for cross-platform
      run: pixi install -e ci-minimal --platform ${{ matrix.platform }}

    - name: Run cross-platform tests
      run: pixi run -e ci-minimal --platform ${{ matrix.platform }} test

  security:
    runs-on: ubuntu-latest
    needs: [quality-gates]
    steps:
    - uses: actions/checkout@v4

    - name: Setup pixi
      uses: prefix-dev/setup-pixi@v0.8.11
      with:
        pixi-version: ${{ env.PIXI_VERSION }}
        cache: true
        manifest-path: pyproject.toml

    - name: Install dependencies
      run: pixi install -e quality-extended

    - name: Run security checks
      run: pixi run -e quality-extended static-analysis

  build:
    runs-on: ubuntu-latest
    needs: [quality-gates]
    steps:
    - uses: actions/checkout@v4

    - name: Setup pixi
      uses: prefix-dev/setup-pixi@v0.8.11
      with:
        pixi-version: ${{ env.PIXI_VERSION }}
        cache: true
        manifest-path: pyproject.toml

      - name: Test package functionality
        run: |
          echo "🧪 Testing package functionality..."
          pixi run -e dev python -c 'import mcp_server_cheap_llm; print("Package imported")'
          echo "🏃 Testing MCP server execution..."
          pixi run -e dev python -m mcp_server_cheap_llm --help

    - name: Build and check package
      run: pixi run -e quality-full build
