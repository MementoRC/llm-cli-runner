name: CI Simple

on:
  push:
    branches: [main, master, develop, development]
  pull_request:
    branches: [main, master, develop, development]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-asyncio pytest-cov pytest-timeout
        pip install ruff

    - name: Run quality checks - Lint (ZERO-TOLERANCE)
      run: |
        echo "🚨 ZERO-TOLERANCE: Checking for F,E9 violations..."
        ruff check src/ tests/ --select=F,E9
        if [ $? -ne 0 ]; then
          echo "❌ CRITICAL FAILURE: F,E9 violations detected!"
          exit 1
        fi
        echo "✅ No F,E9 violations found"

    - name: Run tests
      run: |
        pytest tests/unit/test_basic.py tests/unit/test_config_minimal.py tests/unit/test_server_handlers.py -v --tb=short

    - name: Check repository hygiene
      run: |
        echo "🔍 Checking repository hygiene..."

        # Check for __pycache__ in git
        if git ls-files | grep -q "__pycache__"; then
          echo "❌ ERROR: __pycache__ directories tracked in git!"
          exit 1
        fi

        # Check for .pyc files in git
        if git ls-files | grep -q "\.pyc$"; then
          echo "❌ ERROR: .pyc files tracked in git!"
          exit 1
        fi

        echo "✅ Repository hygiene check passed"
